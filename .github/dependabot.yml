version: 2

updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      gomod:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: "/deployments/containers"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"

  - package-ecosystem: pip
    directory: "/scripts/automation"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
