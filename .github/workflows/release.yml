name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - run: go test -buildvcs=false ./... -race -count=1

  release:
    name: Release
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.26.2'

      - uses: sigstore/cosign-installer@e1523de7571e31dbe865fd2e80c5c7c23ae71eb4 # v3.4.0
      - uses: anchore/sbom-action/download-syft@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.18.0

      - name: Extract release notes
        id: notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          awk -v ver="${REF_NAME#v}" '
            /^## \[/ {
              if (capture) exit
              if ($0 ~ "^## \\[" ver "\\]") { capture = 1; next }
            }
            capture { print }
          ' CHANGELOG.md > dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            echo "Release ${REF_NAME}." > dist/release-notes.md
          fi

      - uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6
        with:
          distribution: goreleaser
          version: 'v2.x'
          args: release --clean --release-notes dist/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
