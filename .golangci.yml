version: "2"

run:
  timeout: 10m
  relative-path-mode: gomod
  tests: true
  build-tags:
    - integration
    - acceptance

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dantte-lp/pulumi-eos

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      colors: true
  show-stats: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # Security
    - gosec
    - bidichk
    - forcetypeassert
    - reassign
    - containedctx
    - forbidigo

    # Correctness
    - govet
    - staticcheck
    - errcheck
    - bodyclose
    - noctx
    - contextcheck
    - nilerr
    - nilnesserr
    - nilnil
    - durationcheck
    - fatcontext
    - copyloopvar
    - predeclared
    - recvcheck
    - gocheckcompilerdirectives
    - protogetter
    - iface
    - asasalint
    - gochecksumtype
    - gochecknoinits
    - iotamixing

    # Error handling
    - errorlint
    - err113
    - errname
    - errchkjson

    # Network
    - nosprintfhostport

    # Code quality
    - gocritic
    - funlen
    - exhaustive
    - unparam
    - unconvert
    - unused
    - ineffassign
    - maintidx
    - nakedret
    - nonamedreturns
    - goprintffuncname
    - interfacebloat
    - inamedparam
    - decorder
    - embeddedstructfieldcheck
    - nestif
    - funcorder
    - goconst
    - godox

    # Performance
    - prealloc
    - perfsprint
    - makezero
    - mirror
    - wastedassign
    - intrange
    - exptostd

    # Style
    - dupl
    - misspell
    - sloglint
    - musttag
    - modernize
    - asciicheck
    - canonicalheader
    - dupword
    - usestdlibvars
    - loggercheck
    - whitespace
    - godot
    - godoclint
    - tagalign
    - importas

    # Dependencies
    - depguard
    - gomoddirectives
    - gomodguard

    # Discipline
    - nolintlint

    # Tests
    - tparallel
    - thelper
    - testableexamples
    - usetesting
    - testifylint
    - paralleltest

  settings:
    gosec:
      # Run every available rule (default empty includes = all).
      excludes: []
      severity: low
      confidence: low
      config:
        global:
          # Audit mode: report ignored issues; nosec annotations still
          # honoured but surfaced in the audit log.
          audit: "true"
          nosec: "true"
          show-ignored: "true"
        # Default file-permission expectations on non-test paths.
        # Tests and bootstrap scripts may relax via `//nolint:gosec`.
        G301: "0750"
        G302: "0600"
        G306: "0600"
    govet:
      enable:
        - shadow
        - atomic
        - copylocks
        - loopclosure
        - httpmux
    funlen:
      lines: 60
      statements: 40
    maintidx:
      under: 20
    nakedret:
      max-func-lines: 0
    exhaustive:
      default-signifies-exhaustive: true
    interfacebloat:
      max: 10
    importas:
      no-unaliased: false
    depguard:
      rules:
        main:
          deny:
            - pkg: "math/rand$"
              desc: "Use crypto/rand or math/rand/v2"
            - pkg: "^log$"
              desc: "Use log/slog"
            - pkg: "io/ioutil"
              desc: "Deprecated in Go 1.16"
            - pkg: "unsafe"
              desc: "Forbidden — provider handles untrusted device input"
    nolintlint:
      require-explanation: true
      require-specific: true
    sloglint:
      attr-only: false
    loggercheck:
      require-string-key: true
      no-printf-like: true
    forbidigo:
      forbid:
        - pattern: '^fmt\.Print(|f|ln)$'
          msg: "Use slog or t.Logf in library code; fmt.Print* is allowed only under cmd/ and scripts/."
        - pattern: '^print(ln)?$'
          msg: "Bootstrap-only builtin; use slog instead."
      exclude-godoc-examples: true
    goconst:
      min-len: 4
      min-occurrences: 5
      match-constant: true
      ignore-string-values:
        # EOS CLI fragments — kept inline so the call site reads as a CLI
        # transcript rather than a constant lookup.
        - '^(no |interface |vlan |port-channel |configure session ).*$'
    godox:
      keywords:
        - TODO
        - FIXME
        - HACK
        - XXX
        - BUG
        - OPTIMIZE
    gomodguard:
      blocked:
        modules:
          - github.com/pkg/errors:
              recommendations:
                - errors
                - fmt
              reason: "Standard library has covered errors.Is / errors.As since Go 1.13."
          - io/ioutil:
              recommendations:
                - io
                - os
              reason: "Deprecated in Go 1.16; use io / os equivalents."
    nestif:
      min-complexity: 5
    funcorder:
      constructor: true
      struct-method: true
    paralleltest:
      ignore-missing: false
      ignore-missing-subtests: false
    embeddedstructfieldcheck:
      forbid-mutex: true

  exclusions:
    generated: strict
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gosec
          - dupl
          - funlen
          - err113
          - nonamedreturns
          - maintidx
          - containedctx
          - forcetypeassert
          - goconst
          - godox
          - paralleltest
          - funcorder
          - nestif
      - path: cmd/
        linters:
          - gochecknoinits
          - forbidigo
      - path: scripts/
        linters:
          - forbidigo
          - depguard
      - path: scripts/vuln-audit.go
        text: "import 'os/exec' is not allowed"
        linters:
          - depguard
      - path: pkg/eos/internal/generated/
        linters:
          - all

severity:
  default: warning
  rules:
    - linters:
        - gosec
        - errcheck
        - bodyclose
        - noctx
        - staticcheck
        - forcetypeassert
        - containedctx
        - nilnil
        - reassign
        - forbidigo
        - gomodguard
        - iotamixing
        - paralleltest
      severity: error
