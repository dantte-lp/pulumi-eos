extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - chore
      - docs
      - build
      - ci
      - refactor
      - perf
      - test
      - style
      - revert
  scope-enum:
    - 2
    - always
    - - device
      - l2
      - l3
      - multicast
      - security
      - management
      - qos
      - cvp
      - eapi
      - gnmi
      - gnoi
      - client
      - provider
      - schema
      - sdk
      - docs
      - ci
      - build
      - deps
      - release
      - test
      - lint
      - automation
      - examples
      - audit
      - status
      - verify
      - plugin
  subject-case:
    - 2
    - always
    - - sentence-case
      - lower-case
  header-max-length:
    - 2
    - always
    - 100
  body-max-line-length:
    - 1
    - always
    - 120
