version: "2"

run:
  timeout: 10m
  relative-path-mode: gomod
  tests: true
  build-tags:
    - integration
    - acceptance

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dantte-lp/pulumi-eos

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      colors: true
  show-stats: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # Security
    - gosec
    - bidichk
    - forcetypeassert
    - reassign
    - containedctx

    # Correctness
    - govet
    - staticcheck
    - errcheck
    - bodyclose
    - noctx
    - contextcheck
    - nilerr
    - nilnesserr
    - nilnil
    - durationcheck
    - fatcontext
    - copyloopvar
    - predeclared
    - recvcheck
    - gocheckcompilerdirectives
    - protogetter
    - iface
    - asasalint
    - gochecksumtype
    - gochecknoinits

    # Error handling
    - errorlint
    - err113
    - errname
    - errchkjson

    # Network
    - nosprintfhostport

    # Code quality
    - gocritic
    - funlen
    - exhaustive
    - unparam
    - unconvert
    - unused
    - ineffassign
    - maintidx
    - nakedret
    - nonamedreturns
    - goprintffuncname
    - interfacebloat
    - inamedparam
    - decorder

    # Performance
    - prealloc
    - perfsprint
    - makezero
    - mirror
    - wastedassign
    - intrange
    - exptostd

    # Style
    - dupl
    - misspell
    - sloglint
    - musttag
    - modernize
    - asciicheck
    - canonicalheader
    - dupword
    - usestdlibvars
    - loggercheck
    - whitespace
    - godot
    - godoclint
    - tagalign
    - importas

    # Dependencies
    - depguard
    - gomoddirectives

    # Discipline
    - nolintlint

    # Tests
    - tparallel
    - thelper
    - testableexamples
    - usetesting
    - testifylint

  settings:
    gosec:
      config:
        global:
          audit: "true"
    govet:
      enable:
        - shadow
        - atomic
        - copylocks
        - loopclosure
        - httpmux
    funlen:
      lines: 60
      statements: 40
    maintidx:
      under: 20
    nakedret:
      max-func-lines: 0
    exhaustive:
      default-signifies-exhaustive: true
    interfacebloat:
      max: 10
    importas:
      no-unaliased: false
    depguard:
      rules:
        main:
          deny:
            - pkg: "math/rand$"
              desc: "Use crypto/rand or math/rand/v2"
            - pkg: "^log$"
              desc: "Use log/slog"
            - pkg: "io/ioutil"
              desc: "Deprecated in Go 1.16"
            - pkg: "unsafe"
              desc: "Forbidden — provider handles untrusted device input"
    nolintlint:
      require-explanation: true
      require-specific: true
    sloglint:
      attr-only: false
    loggercheck:
      require-string-key: true
      no-printf-like: true

  exclusions:
    generated: strict
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gosec
          - dupl
          - funlen
          - err113
          - nonamedreturns
          - maintidx
          - containedctx
          - forcetypeassert
      - path: cmd/
        linters:
          - gochecknoinits
      - path: scripts/vuln-audit.go
        text: "import 'os/exec' is not allowed"
        linters:
          - depguard
      - path: pkg/eos/internal/generated/
        linters:
          - all

severity:
  default: warning
  rules:
    - linters:
        - gosec
        - errcheck
        - bodyclose
        - noctx
        - staticcheck
        - forcetypeassert
        - containedctx
        - nilnil
        - reassign
      severity: error
