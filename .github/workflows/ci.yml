name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Build
        shell: bash
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          GIT_COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X github.com/dantte-lp/pulumi-eos/internal/version.Version=${VERSION} \
            -X github.com/dantte-lp/pulumi-eos/internal/version.GitCommit=${GIT_COMMIT} \
            -X github.com/dantte-lp/pulumi-eos/internal/version.BuildDate=${BUILD_DATE}"
          mkdir -p bin
          go build -buildvcs=false -ldflags="${LDFLAGS}" -o bin/pulumi-resource-eos ./cmd/pulumi-resource-eos

      - name: Install test tooling
        run: |
          go install gotest.tools/gotestsum@latest
          pip install --break-system-packages --no-cache-dir junit2html 2>/dev/null || true

      - name: Test with coverage
        run: |
          gotestsum \
            --junitfile unit-report.xml \
            --jsonfile unit-report.json \
            --format short-verbose \
            -- -buildvcs=false ./... -race -count=1 \
               -coverprofile=coverage.out -covermode=atomic

      - name: HTML report
        if: always()
        run: junit2html unit-report.xml unit-report.html 2>/dev/null || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: |
            unit-report.xml
            unit-report.json
            unit-report.html
            coverage.out
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: golangci-lint v2
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run ./...

  lint-docs:
    name: Lint (docs · markdown · mermaid · yaml · spell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v6.0.0
        with:
          node-version: '22'

      - name: System libs for headless Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libxss1 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 \
            libxkbcommon0 libdrm2 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libpango-1.0-0 libcairo2 fonts-liberation

      - run: |
          npm install -g markdownlint-cli2@latest @mermaid-js/mermaid-cli@latest cspell@latest
          pip install --user yamllint

      - name: Install Chrome for puppeteer (mermaid render)
        run: |
          cd "$(npm root -g)/@mermaid-js/mermaid-cli" && npx --yes puppeteer browsers install chrome

      - name: markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#vendor" "#sdk" "#reports" "#dist"

      - name: mermaid render lint
        run: bash scripts/lint-mermaid.sh

      - name: yamllint
        run: ~/.local/bin/yamllint -c .yamllint.yaml .

      - name: cspell
        run: cspell --no-progress --no-summary --config .cspell.json "**/*.md" "**/*.go"

      - name: probe-rule check (rule 2b)
        run: bash scripts/lint-probes.sh

  vulncheck:
    name: Vulnerability audit
    runs-on: ubuntu-latest
    container:
      image: golang:1.26.2-trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - run: go run ./scripts/vuln-audit.go

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: [build-and-test, lint-go, lint-docs, vulncheck]
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  commitlint:
    name: Commitlint (PR title)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v6.0.0
        with:
          node-version: '22'

      - run: npm install -g @commitlint/cli@latest @commitlint/config-conventional@latest

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | commitlint --config .commitlintrc.yaml
