# containers.conf — pulumi-eos project-scoped runtime configuration.
# Spec: containers.conf.5
# (https://github.com/containers/common/blob/main/docs/containers.conf.5.md).
#
# Apply via:
#   export CONTAINERS_CONF=$(pwd)/deployments/containers/containers.conf
#
# Or, for global user-level use, copy to:
#   ~/.config/containers/containers.conf
#
# Settings here pin runtime defaults so the dev / integration loops are
# reproducible across hosts. The Compose Specification stacks under
# deployments/compose/ inherit them automatically when CONTAINERS_CONF
# is exported in the shell that invokes podman-compose.

[containers]
# Default user-namespace mapping. `keep-id` preserves the host UID inside
# the container, matching the bind-mount semantics the dev container
# relies on for /app and /go pkg-mod cache.
userns = "keep-id"

# Default capabilities deliberately tightened — cEOS Lab needs
# SYS_ADMIN + NET_ADMIN, those are added explicitly per-service in
# deployments/compose/compose.integration.yml.
default_capabilities = [
  "CHOWN",
  "DAC_OVERRIDE",
  "FOWNER",
  "FSETID",
  "KILL",
  "NET_BIND_SERVICE",
  "SETFCAP",
  "SETGID",
  "SETPCAP",
  "SETUID",
  "SYS_CHROOT",
]

# Match the host's idea of init so signal-forwarding behaves predictably
# across `podman exec` invocations from `make verify`.
init = true

# DNS plumbing for the dev / integration containers — keep host's
# resolv.conf rather than relying on container engine guesses.
dns_options = ["edns0"]

# Time-zone defaults to host so log timestamps line up with developer
# machines — important when reading cEOS bootstrap logs.
tz = "local"

[engine]
# Re-use container images already on disk; avoids accidental pulls when
# the integration container resolves `localhost/ceos:4.36.0.1F` (which
# is imported, not pulled).
pull_policy = "missing"

# Keep `podman compose` aligned with `podman-compose` semantics.
compose_providers = ["podman-compose"]

# Stop signal grace period: cEOS systemd PID-1 needs a couple of seconds
# to flush state cleanly.
stop_timeout = 10

[network]
# Default to netavark backend (CNI is deprecated). Aligns with the
# `host.containers.internal` resolution the integration tests rely on
# from inside `pulumi-eos-dev`.
network_backend = "netavark"
