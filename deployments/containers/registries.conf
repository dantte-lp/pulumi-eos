# registries.conf — Podman/Buildah short-name resolution for this project.
# Spec: containers.conf.5 (https://github.com/containers/common/blob/main/docs/containers.conf.5.md)
#       and registries.conf.5.
#
# Used by builds and CI runners that opt in via:
#   CONTAINERS_REGISTRIES_CONF=$(pwd)/deployments/containers/registries.conf
#
# Aliases give first-party names without leaking vendor strings into
# Containerfiles. Search order is explicit; resolution mode is "permissive"
# during local dev and "strict" in CI.

unqualified-search-registries = ["ghcr.io", "quay.io", "registry.fedoraproject.org", "docker.io"]

short-name-mode = "permissive"

[aliases]
  "golang"   = "docker.io/library/golang"
  "debian"   = "docker.io/library/debian"
  "alpine"   = "docker.io/library/alpine"
  "node"     = "docker.io/library/node"
  "python"   = "docker.io/library/python"
  "ubuntu"   = "docker.io/library/ubuntu"
